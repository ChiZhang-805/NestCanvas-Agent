services:
  - type: web
    name: nestcanvas-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SYNC_JOBS
        value: "true"

  - type: web
    name: nestcanvas-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NESTCANVAS_API_HOSTPORT
        fromService:
          type: web
          name: nestcanvas-api
          property: hostport
