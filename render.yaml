services:
  - type: web
    name: nestcanvas-api
    runtime: python
    plan: free
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: PYTHONPATH=apps/api uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SYNC_JOBS
        value: "true"
      - key: CORS_ORIGINS
        value: https://nestcanvas-web.onrender.com,http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:3010,http://127.0.0.1:3010,http://localhost:3011,http://127.0.0.1:3011

  - type: web
    name: nestcanvas-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NESTCANVAS_API_BASE_URL
        value: https://nestcanvas-api.onrender.com
