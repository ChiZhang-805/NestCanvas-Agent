services:
  postgres:
    image: postgres:16
    container_name: nestcanvas-postgres
    environment:
      POSTGRES_USER: nestcanvas
      POSTGRES_PASSWORD: nestcanvas
      POSTGRES_DB: nestcanvas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestcanvas -d nestcanvas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: nestcanvas-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
